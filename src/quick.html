<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quick note</title>
<style>
  :root {
    --card: #2a2c30; --text: #e7e9ec; --muted: #9aa0a8; --border: #3c4046; --accent: #4f8cff;
  }
  @media (prefers-color-scheme: light) {
    :root { --card: #ffffff; --text: #1c1e21; --muted: #6b7280; --border: #e2e5ea; }
  }
  html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; padding: 10px;
  }
  .card {
    flex: 1; background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; box-shadow: 0 12px 40px rgba(0,0,0,.35);
    padding: 14px 16px; display: flex; flex-direction: column;
    position: relative;
  }
  /* Highlight while a file is dragged over the window. */
  .card.drop { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent), 0 12px 40px rgba(0,0,0,.35); }
  .dropmask {
    position: absolute; inset: 0; border-radius: 14px; display: none;
    align-items: center; justify-content: center; pointer-events: none;
    background: color-mix(in srgb, var(--accent) 12%, var(--card));
    color: var(--accent); font-size: 14px; font-weight: 600;
  }
  .card.drop .dropmask { display: flex; }
  .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .target { font-size: 13px; color: var(--text); font-weight: 600; }
  .target span { color: var(--accent); }
  .hint { font-size: 11px; color: var(--muted); }
  textarea {
    flex: 1; resize: none; border: none; outline: none; background: transparent;
    color: var(--text); font: inherit; font-size: 15px; line-height: 1.4;
  }
  textarea::placeholder { color: var(--muted); }
  .pending {
    display: none; flex: 0 0 auto; margin-top: 6px;
    font-size: 11px; color: var(--accent);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .saved { color: var(--accent); }
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="target">→ <span id="target">…</span></div>
      <div class="hint" id="hint">Enter to save · drop files to attach · Esc to cancel</div>
    </div>
    <textarea id="input" placeholder="Type a note, or drop files here…"></textarea>
    <div class="pending" id="pending"></div>
    <div class="dropmask" id="dropmask">Drop to save to this note</div>
  </div>

<script>
  // This window only ever loads inside the Notekeeper app, but guard the Tauri
  // bridge anyway so opening quick.html as a plain file shows a message instead
  // of throwing on the first property access and rendering a blank box.
  const input = document.getElementById('input');
  const targetEl = document.getElementById('target');
  const hintEl = document.getElementById('hint');
  const card = document.querySelector('.card');
  const pendingEl = document.getElementById('pending');
  const DEFAULT_HINT = 'Enter to save · drop files to attach · Esc to cancel';
  // Files dropped onto the window queue up here until you press Enter, so you can
  // drop several (across multiple drags) and add a note before saving them all.
  let pendingFiles = [];
  const basename = (p) => p ? p.split(/[\\/]/).pop() : p;
  function renderPending() {
    if (!pendingFiles.length) { pendingEl.style.display = 'none'; pendingEl.textContent = ''; return; }
    pendingEl.style.display = 'block';
    pendingEl.textContent = '📎 ' + pendingFiles.map(f => f.name).join(', ');
  }
  if (!(window.__TAURI__ && window.__TAURI__.core)) {
    targetEl.textContent = 'not in app';
    hintEl.textContent = 'Open Notekeeper from the menu bar.';
    input.disabled = true;
    throw new Error('Notekeeper backend not attached');
  }
  const { invoke } = window.__TAURI__.core;
  const { getCurrentWindow } = window.__TAURI__.window;
  const win = getCurrentWindow();
  let target = null;

  function applyTarget(t) {
    target = t;
    targetEl.textContent = t ? t.name : 'no target';
  }

  async function refreshTarget() {
    try { applyTarget(await invoke('get_quick_target')); } catch (e) { console.error(e); }
  }

  // Initial load + every time the hotkey re-opens this window.
  refreshTarget();
  window.__TAURI__.event.listen('quick-open', (e) => {
    applyTarget(e.payload);
    input.value = '';
    pendingFiles = [];
    renderPending();
    hintEl.textContent = DEFAULT_HINT;
    hintEl.className = 'hint';
    dragging = false;
    clearTimeout(hideTimer);
    card.classList.remove('drop');
    setTimeout(() => input.focus(), 30);
  });

  setTimeout(() => input.focus(), 50);

  async function save() {
    if (!target) { win.hide(); return; }
    const text = input.value.trim();
    const files = pendingFiles.map(f => f.path);
    // Nothing typed and nothing queued — just dismiss.
    if (!text && !files.length) { win.hide(); return; }
    try {
      if (text) { await invoke('append_note', { id: target.id, text }); input.value = ''; }
      let savedFiles = 0;
      if (files.length) { savedFiles = await invoke('save_files', { id: target.id, paths: files }); }
      pendingFiles = [];
      renderPending();
      const parts = [];
      if (text) parts.push('note');
      if (savedFiles) parts.push(savedFiles + ' file' + (savedFiles === 1 ? '' : 's'));
      hintEl.textContent = 'Saved ' + parts.join(' + ') + ' ✓';
      hintEl.className = 'hint saved';
      setTimeout(() => win.hide(), 400);
    } catch (e) {
      hintEl.textContent = '✗ ' + e;
      hintEl.className = 'hint';
    }
  }

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); save(); }
    else if (e.key === 'Escape') { e.preventDefault(); input.value = ''; pendingFiles = []; renderPending(); win.hide(); }
  });

  // ---- file drag-and-drop ----
  // Copy dropped files into this note's destination folder via the backend.
  let dragging = false;
  let hideTimer = null;

  // Grabbing a file from Finder activates Finder, which blurs (and would
  // normally hide) this popup before the drag ever reaches it. So defer the
  // hide briefly and let an incoming drag cancel it, instead of hiding at once.
  //
  // The condition is re-checked when the timer *fires*, not just when it's
  // scheduled: if a drag has re-entered the window or focus has come back in the
  // meantime, we keep the popup open. This avoids a race where dragging out of
  // the small window and back in (taking longer than the delay) would hide it
  // before the file could be dropped.
  function scheduleHide() {
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      if (dragging || document.hasFocus()) return;
      // Don't auto-dismiss queued files or a typed note out of existence — that
      // work would be lost. Esc cancels explicitly; a successful save still hides.
      if (pendingFiles.length || input.value.trim()) return;
      win.hide();
    }, 400);
  }

  // Queue dropped files instead of saving immediately, so you can drop several
  // (across multiple drags) and optionally add a note, then press Enter to save
  // them all at once. The window stays up and refocuses, ready for more.
  function addPending(paths) {
    const files = (paths || []).filter(Boolean);
    if (!files.length) return;
    for (const p of files) {
      if (!pendingFiles.some(f => f.path === p)) pendingFiles.push({ path: p, name: basename(p) });
    }
    renderPending();
    hintEl.textContent = pendingFiles.length + ' file' + (pendingFiles.length === 1 ? '' : 's') + ' ready · Enter to save · Esc to cancel';
    hintEl.className = 'hint';
    // Keep the popup open and focused for another drop, a note, or Enter.
    clearTimeout(hideTimer);
    win.setFocus().catch(() => {});
    setTimeout(() => input.focus(), 30);
  }

  // Tauri captures OS file drops (dragDropEnabled is on by default) and emits
  // these events with real filesystem paths — exactly what save_files needs.
  const ev = window.__TAURI__.event;
  ev.listen('tauri://drag-enter', () => {
    dragging = true;
    clearTimeout(hideTimer);
    card.classList.add('drop');
  });
  ev.listen('tauri://drag-over', () => {
    dragging = true;
    clearTimeout(hideTimer);
  });
  ev.listen('tauri://drag-leave', () => {
    dragging = false;
    card.classList.remove('drop');
    // The drag left without dropping; if we're not the active window, dismiss.
    if (!document.hasFocus()) scheduleHide();
  });
  ev.listen('tauri://drag-drop', (e) => {
    dragging = false;
    card.classList.remove('drop');
    const paths = (e.payload && e.payload.paths) || [];
    addPending(paths);
  });

  // Dismiss when the window loses focus (e.g. you click elsewhere), unless a
  // file is being dragged in.
  window.addEventListener('blur', () => { scheduleHide(); });
</script>
</body>
</html>
